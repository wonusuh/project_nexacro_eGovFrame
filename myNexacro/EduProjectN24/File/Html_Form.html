<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            vertical-align: middle;
        }

        label {
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.5);
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4a90e2;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #357abd;
        }

        .submit-row {
            text-align: center;
            padding-top: 10px;
        }
    </style>

<script type="text/javascript">
    if(!window.NEXACROHTML){
        window.NEXACROHTML = {};
    }
	
	//onusernotify 이벤트 정의
	window.NEXACROHTML.FireUserNotify = function(userdata)
	{
		var NXWB = window.NEXACROWEBBROWSER;
		if (NXWB){
			// WRE, NRE(iOS/iPadOS)
			NXWB.on_fire_onusernotify(NXWB, userdata);
		}
		else if (typeof nexacro == "undefined"){      
			// NRE(Window)
			window.document.title = userdata;
		}
		else if (nexacro){     
			// NRE(Android, macOS)
			nexacro.fireUserNotify(userdata);  
		} 
	}
	
	function htmlFunction(arg)
	{
		alert(arg);
		document.getElementById("name").value = arg;
	}
	
	function callNexacro()
	{
		var userdata = document.getElementById("name").value;
		window.NEXACROHTML.FireUserNotify(userdata);      
	}    
	
</script>
</head>
<body>
    <div class="form-container">
        <h2>Html Page</h2>
        <table>
            <tr>
                <td><label for="name">Name</label></td>
                <td><input type="text" id="name" value="NEXACRO"></td>
            </tr>
            <tr>
                <td><label for="note">Note</label></td>
                <td><textarea id="note"></textarea></td>
            </tr>
            <tr>
                <td colspan="2" class="submit-row">
                    <button onclick="callNexacro()">Call Nexacro</button>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
